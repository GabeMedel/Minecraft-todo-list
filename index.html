<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>MC Tracker Test</title>
<style>
  body { background: #0d1117; color: #e6edf3; font-family: monospace; padding: 40px; font-size: 16px; }
  .box { background: #161b22; border: 1px solid #30363d; padding: 24px; max-width: 500px; margin-bottom: 20px; }
  .green { color: #27ae60; }
  .red { color: #e74c3c; }
  .yellow { color: #f39c12; }
  button { background: #238636; border: 2px solid #2ea043; color: #fff; font-family: monospace; font-size: 14px; padding: 10px 20px; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>

<div class="box">
  <div class="green">✅ STEP 1: HTML IS LOADING</div>
  <div style="color:#8b949e;margin-top:8px;font-size:13px">If you can read this, the file is working correctly.</div>
</div>

<div class="box" id="step2">
  <div class="yellow">⏳ STEP 2: Checking JavaScript...</div>
</div>

<div class="box" id="step3" style="display:none">
  <div id="step3-msg"></div>
</div>

<div class="box" id="step4" style="display:none">
  <div id="step4-msg"></div>
</div>

<div id="launch-box" style="display:none">
  <button onclick="window.location='minecraft-full.html'">This was just a test page — see instructions below</button>
</div>

<script>
  // Step 2: JS works
  document.getElementById("step2").innerHTML = '<div class="green">✅ STEP 2: JavaScript is working</div>';

  // Step 3: Test Firebase
  var step3 = document.getElementById("step3");
  step3.style.display = "block";
  document.getElementById("step3-msg").innerHTML = '<div class="yellow">⏳ STEP 3: Connecting to Firebase...</div>';

  fetch("https://minecraft-todo-7bd20-default-rtdb.firebaseio.com/.json")
    .then(function(r) {
      var step4 = document.getElementById("step4");
      step4.style.display = "block";
      if (r.ok) {
        document.getElementById("step3-msg").innerHTML = '<div class="green">✅ STEP 3: Firebase connected! (HTTP ' + r.status + ')</div>';
        document.getElementById("step4-msg").innerHTML = '<div class="green">✅ ALL CHECKS PASSED — your setup is working!</div><div style="color:#8b949e;margin-top:8px;font-size:13px">The full app should work. Reply to the chat and Claude will send the fixed full version.</div>';
      } else {
        document.getElementById("step3-msg").innerHTML = '<div class="red">❌ STEP 3: Firebase returned HTTP ' + r.status + '</div>';
        document.getElementById("step4-msg").innerHTML = '<div class="red">Firebase rules are likely blocking access.</div><div style="color:#8b949e;margin-top:8px;font-size:13px">Go to Firebase Console → Realtime Database → Rules → set both to true → Publish.</div>';
      }
    })
    .catch(function(err) {
      var step4 = document.getElementById("step4");
      step4.style.display = "block";
      document.getElementById("step3-msg").innerHTML = '<div class="red">❌ STEP 3: Firebase unreachable</div>';
      document.getElementById("step4-msg").innerHTML = '<div class="red">Error: ' + err.message + '</div><div style="color:#8b949e;margin-top:8px;font-size:13px">This is likely a network/CORS issue. Try a different browser or disable any VPN/ad blocker.</div>';
    });
</script>
</body>
</html>
